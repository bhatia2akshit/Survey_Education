<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inclusive Learning Survey</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f7f7f7;
      color: #222;
    }
    .card {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
      max-width: 520px;
      text-align: center;
    }
    h1 {
      margin-top: 0;
      font-size: 28px;
    }
    p {
      line-height: 1.5;
      margin-bottom: 24px;
    }
    .buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    a.button {
      text-decoration: none;
      padding: 12px 22px;
      border-radius: 10px;
      background: #222;
      color: white;
      font-weight: 600;
      display: inline-block;
    }
    a.button:hover {
      opacity: 0.9;
    }
    .note {
      margin-top: 20px;
      font-size: 14px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Inclusive Learning Survey</h1>
    <p>
      Thank you for your interest. Please choose your preferred language to open the survey.
    </p>
    <div class="buttons">
      <a class="button" href="ENGLISH_FORM_LINK_HERE" target="_blank" rel="noopener noreferrer">English</a>
      <a class="button" href="GERMAN_FORM_LINK_HERE" target="_blank" rel="noopener noreferrer">Deutsch</a>
    </div>
    <div class="note">
      Please do not include names or personally identifiable information in your responses.
    </div>
  </div>
</body>
</html>
